<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows Car Game</title>
    <style>
        canvas {
            background: #eaeaea;
            display: block;
            margin: 0 auto;
            border: 1px solid #000;
        }
        body {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Windows Car Racing Game</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let carWidth = 50;
        let carHeight = 100;
        let carX = canvas.width / 2 - carWidth / 2;
        let carY = canvas.height - carHeight - 10;
        let rightPressed = false;
        let leftPressed = false;
        let score = 0;
        let obstacles = [];
        const obstacleWidth = 50;
        const obstacleHeight = 50;

        document.addEventListener('keydown', keyDownHandler);
        document.addEventListener('keyup', keyUpHandler);

        function keyDownHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = true;
            } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = true;
            }
        }

        function keyUpHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = false;
            } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = false;
            }
        }

        function drawCar() {
            ctx.fillStyle = 'blue';
            ctx.fillRect(carX, carY, carWidth, carHeight);
        }

        function drawObstacle(obstacle) {
            ctx.fillStyle = 'red';
            ctx.fillRect(obstacle.x, obstacle.y, obstacleWidth, obstacleHeight);
        }

        function detectCollision(obstacle) {
            return carX < obstacle.x + obstacleWidth &&
                   carX + carWidth > obstacle.x &&
                   carY < obstacle.y + obstacleHeight &&
                   carY + carHeight > obstacle.y;
        }

        function updateObstacles() {
            if (Math.random() < 0.01) {
                obstacles.push({ x: Math.random() * (canvas.width - obstacleWidth), y: 0 });
            }
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].y += 3;
                if (obstacles[i].y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++;
                    i--;
                } else if (detectCollision(obstacles[i])) {
                    alert('Game Over! Your score: ' + score);
                    document.location.reload();
                }
            }
        }

        function drawScore() {
            ctx.fillStyle = 'black';
            ctx.font = '16px Arial';
            ctx.fillText('Score: ' + score, 8, 20);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCar();
            updateObstacles();
            obstacles.forEach(drawObstacle);
            drawScore();

            if (rightPressed && carX < canvas.width - carWidth) {
                carX += 5;
            } else if (leftPressed && carX > 0) {
                carX -= 5;
            }
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
