<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smashy Road Enhanced</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
  }
  #ui {
    padding: 10px;
    text-align: center;
    background: #000000aa;
    position: absolute;
    width: 100%;
    z-index: 10;
  }
  #ui select, #ui button {
    padding: 6px 12px;
    margin: 0 6px;
    font-size: 16px;
    cursor: pointer;
  }
  canvas {
    display: block;
    margin: 0 auto;
    background: #2b2b2b;
  }
</style>
</head>
<body>

<div id="ui">
  <label>Difficulty:</label>
  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="medium" selected>Medium</option>
    <option value="hard">Hard</option>
  </select>

  <span id="score" style="margin-left:20px;">Score: 0</span>

  <button id="restart" style="display:none;">Restart</button>
</div>

<canvas id="game" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreLabel = document.getElementById("score");
const restartBtn = document.getElementById("restart");
const difficultySelect = document.getElementById("difficulty");

let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

const difficulty = {
  easy:   { trafficRate: 1400, copRate: 5000, copSpeed: 1.6, playerSpeed: 3.2 },
  medium: { trafficRate: 900,  copRate: 3500, copSpeed: 2.2, playerSpeed: 4.0 },
  hard:   { trafficRate: 600,  copRate: 2200, copSpeed: 3.2, playerSpeed: 4.8 }
};

let currentDifficulty = "medium";

let player, traffic, cops, score, gameOver, lastTime;
const ROAD_WIDTH = 420;
const ROAD_X = (canvas.width - ROAD_WIDTH) / 2;

function resetGame() {
  currentDifficulty = difficultySelect.value;

  player = {
    x: canvas.width / 2,
    y: canvas.height - 120,
    w: 34,
    h: 60,
    angle: 0,
    speed: 0,
    maxSpeed: difficulty[currentDifficulty].playerSpeed,
    accel: 0.12,
    friction: 0.05,
    turnSpeed: 0.004
  };

  traffic = [];
  cops = [];
  score = 0;
  gameOver = false;
  lastTime = 0;

  world = {
    trafficTimer: difficulty[currentDifficulty].trafficRate,
    copTimer: difficulty[currentDifficulty].copRate
  };

  restartBtn.style.display = "none";
}

function spawnTraffic() {
  const laneCount = 7;
  const laneWidth = ROAD_WIDTH / laneCount;
  const lane = Math.floor(Math.random() * laneCount);
  const x = ROAD_X + lane * laneWidth + laneWidth / 2;

  traffic.push({
    x,
    y: -100,
    w: 34,
    h: 60,
    speed: 1 + Math.random() * 1.5,
    color: ["#ff4444", "#44ff44", "#4444ff", "#ffaa00"][Math.floor(Math.random()*4)]
  });
}

function spawnCop() {
  cops.push({
    x: ROAD_X + Math.random() * ROAD_WIDTH,
    y: canvas.height + 100,
    w: 36,
    h: 62,
    angle: -Math.PI/2,
    speed: difficulty[currentDifficulty].copSpeed,
    flashTimer: 0
  });
}

function updatePlayer(dt) {
  const up = keys["w"] || keys["arrowup"];
  const down = keys["s"] || keys["arrowdown"];
  const left = keys["a"] || keys["arrowleft"];
  const right = keys["d"] || keys["arrowright"];

  if (up) player.speed += player.accel * dt;
  if (down) player.speed -= player.accel * dt;

  if (!up && !down) {
    if (player.speed > 0) player.speed -= player.friction * dt;
    if (player.speed < 0) player.speed += player.friction * dt;
    if (Math.abs(player.speed) < 0.01) player.speed = 0;
  }

  if (player.speed > player.maxSpeed) player.speed = player.maxSpeed;
  if (player.speed < -player.maxSpeed * 0.4) player.speed = -player.maxSpeed * 0.4;

  if (left) player.angle -= player.turnSpeed * dt * (player.speed !== 0 ? 1 : 0);
  if (right) player.angle += player.turnSpeed * dt * (player.speed !== 0 ? 1 : 0);

  player.x += Math.sin(player.angle) * player.speed * dt;
  player.y -= Math.cos(player.angle) * player.speed * dt;

  if (player.x < ROAD_X + player.w/2) player.x = ROAD_X + player.w/2;
  if (player.x > ROAD_X + ROAD_WIDTH - player.w/2) player.x = ROAD_X + ROAD_WIDTH - player.w/2;
}

function updateTraffic(dt) {
  world.trafficTimer -= dt;
  if (world.trafficTimer <= 0) {
    spawnTraffic();
    world.trafficTimer = difficulty[currentDifficulty].trafficRate;
  }

  for (let i = traffic.length - 1; i >= 0; i--) {
    traffic[i].y += traffic[i].speed * dt * 0.6;
    if (traffic[i].y > canvas.height + 100) traffic.splice(i, 1);
  }
}

function updateCops(dt) {
  world.copTimer -= dt;
  if (world.copTimer <= 0 && cops.length < 4) {
    spawnCop();
    world.copTimer = difficulty[currentDifficulty].copRate;
  }

  for (let cop of cops) {
    const dx = player.x - cop.x;
    const dy = player.y - cop.y;
    const targetAngle = Math.atan2(dx, -dy);

    let diff = targetAngle - cop.angle;
    while (diff > Math.PI) diff -= 2*Math.PI;
    while (diff < -Math.PI) diff += 2*Math.PI;

    cop.angle += diff * 0.002 * dt;
    cop.x += Math.sin(cop.angle) * cop.speed * dt;
    cop.y -= Math.cos(cop.angle) * cop.speed * dt;

    cop.flashTimer += dt;
  }
}

function drawRoad() {
  ctx.fillStyle = "#3a3a3a";
  ctx.fillRect(ROAD_X, 0, ROAD_WIDTH, canvas.height);

  ctx.strokeStyle = "#ffffff55";
  ctx.lineWidth = 4;
  ctx.setLineDash([25, 25]);
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, 0);
  ctx.lineTo(canvas.width/2, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawCar(x, y, w, h, angle, body, roof) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  ctx.fillStyle = body;
  ctx.fillRect(-w/2, -h/2, w, h);

  ctx.fillStyle = roof;
  ctx.fillRect(-w*0.3, -h*0.2, w*0.6, h*0.4);

  ctx.restore();
}

function drawTraffic() {
  for (let car of traffic) {
    drawCar(car.x, car.y, car.w, car.h, 0, car.color, "#000");
  }
}

function drawCops() {
  for (let cop of cops) {
    drawCar(cop.x, cop.y, cop.w, cop.h, cop.angle, "#2222ff", "#ffffff");

    ctx.save();
    ctx.translate(cop.x, cop.y - cop.h/2 + 8);

    const flash = Math.floor(cop.flashTimer / 200) % 2 === 0;

    ctx.fillStyle = flash ? "#ff0000" : "#550000";
    ctx.fillRect(-12, -4, 10, 8);

    ctx.fillStyle = flash ? "#00ffff" : "#003333";
    ctx.fillRect(2, -4, 10, 8);

    ctx.restore();
  }
}

function drawPlayer() {
  drawCar(player.x, player.y, player.w, player.h, player.angle, "#ffcc00", "#ffee66");
}

function rectOverlap(a, b) {
  return !(
    a.x + a.w/2 < b.x - b.w/2 ||
    a.x - a.w/2 > b.x + b.w/2 ||
    a.y + a.h/2 < b.y - b.h/2 ||
    a.y - a.h/2 > b.y + b.h/2
  );
}

function checkCollisions() {
  const p = { x: player.x, y: player.y, w: player.w, h: player.h };

  for (let car of traffic) {
    if (rectOverlap(p, car)) return endGame();
  }
  for (let cop of cops) {
    if (rectOverlap(p, cop)) return endGame();
  }
}

function endGame() {
  gameOver = true;
  restartBtn.style.display = "inline-block";
}

function loop(t) {
  const dt = lastTime ? (t - lastTime) : 16;
  lastTime = t;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRoad();

  if (!gameOver) {
    updatePlayer(dt);
    updateTraffic(dt);
    updateCops(dt);
    checkCollisions();
    score += dt * 0.01;
    scoreLabel.textContent = "Score: " + Math.floor(score);
  }

  drawTraffic();
  drawCops();
  drawPlayer();

  requestAnimationFrame(loop);
}

restartBtn.onclick = () => resetGame();

resetGame();
requestAnimationFrame(loop);
</script>

</body>
</html>
