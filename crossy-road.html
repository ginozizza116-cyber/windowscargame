<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crossy Road Clone</title>

<style>
    body {
        margin: 0;
        background: #222;
        font-family: Arial, sans-serif;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #gameContainer {
        position: relative;
        width: 400px;
        height: 600px;
        background: #333;
        overflow: hidden;
        border: 3px solid #fff;
    }

    #player {
        position: absolute;
        width: 30px;
        height: 30px;
        background: yellow;
        bottom: 10px;
        left: 185px;
    }

    .car {
        position: absolute;
        width: 50px;
        height: 30px;
        background: red;
    }

    /* MENU */
    #menu {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        z-index: 10;
    }

    #menu h1 {
        margin-bottom: 20px;
        font-size: 32px;
    }

    .btn {
        padding: 12px 25px;
        margin: 10px;
        background: #4caf50;
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
        border-radius: 6px;
    }

    .btn:hover {
        background: #45a049;
    }

    select {
        padding: 10px;
        font-size: 16px;
        margin-top: 10px;
    }
</style>
</head>

<body>
<div id="gameContainer">
    <div id="player"></div>

    <!-- MENU OVERLAY -->
    <div id="menu">
        <h1>Crossy Road</h1>
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
            <option value="1">Easy</option>
            <option value="1.5">Normal</option>
            <option value="2">Hard</option>
            <option value="3">Insane</option>
        </select>
        <button class="btn" id="startBtn">Play</button>
    </div>
</div>

<script>
const player = document.getElementById("player");
const gameContainer = document.getElementById("gameContainer");
const menu = document.getElementById("menu");
const startBtn = document.getElementById("startBtn");
const difficultySelect = document.getElementById("difficulty");

let gameRunning = false;
let carSpeedMultiplier = 1;
let cars = [];
let spawnInterval;

function startGame() {
    menu.style.display = "none";
    gameRunning = true;

    carSpeedMultiplier = parseFloat(difficultySelect.value);

    cars.forEach(c => c.remove());
    cars = [];

    player.style.left = "185px";
    player.style.bottom = "10px";

    spawnInterval = setInterval(spawnCar, 900 / carSpeedMultiplier);
    requestAnimationFrame(gameLoop);
}

startBtn.onclick = startGame;

function spawnCar() {
    const car = document.createElement("div");
    car.classList.add("car");

    const lane = Math.floor(Math.random() * 10);
    const y = lane * 60;

    const direction = Math.random() < 0.5 ? "left" : "right";

    if (direction === "left") {
        car.style.left = "400px";
        car.dataset.dir = "left";
    } else {
        car.style.left = "-60px";
        car.dataset.dir = "right";
    }

    car.style.top = y + "px";
    gameContainer.appendChild(car);
    cars.push(car);
}

function gameLoop() {
    if (!gameRunning) return;

    cars.forEach((car, index) => {
        let x = parseInt(car.style.left);

        if (car.dataset.dir === "left") {
            x -= 3 * carSpeedMultiplier;
            if (x < -80) {
                car.remove();
                cars.splice(index, 1);
            }
        } else {
            x += 3 * carSpeedMultiplier;
            if (x > 450) {
                car.remove();
                cars.splice(index, 1);
            }
        }

        car.style.left = x + "px";

        if (isColliding(player, car)) {
            endGame();
        }
    });

    requestAnimationFrame(gameLoop);
}

function isColliding(a, b) {
    const ar = a.getBoundingClientRect();
    const br = b.getBoundingClientRect();
    return !(
        ar.right < br.left ||
        ar.left > br.right ||
        ar.bottom < br.top ||
        ar.top > br.bottom
    );
}

function endGame() {
    gameRunning = false;
    clearInterval(spawnInterval);
    menu.style.display = "flex";
}

document.addEventListener("keydown", (e) => {
    if (!gameRunning) return;

    let x = parseInt(player.style.left);
    let y = parseInt(player.style.bottom);

    if (e.key === "ArrowUp") y += 20;
    if (e.key === "ArrowDown") y -= 20;
    if (e.key === "ArrowLeft") x -= 20;
    if (e.key === "ArrowRight") x += 20;

    if (x >= 0 && x <= 370) player.style.left = x + "px";
    if (y >= 0 && y <= 570) player.style.bottom = y + "px";
});
</script>
</body>
</html>
